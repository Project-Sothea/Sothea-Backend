version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "db/schema"
    queries:
      - "db/queries"
    gen:
      go:
        package: "db"
        out: "repository/sqlc"
        emit_prepared_queries: true
        emit_json_tags: true
        emit_pointers_for_null_types: true
        sql_package: "pgx/v5"
        overrides:
          - column: "prescription_lines.dose_amount"
            go_type: "float64"
          - column: "prescription_lines.duration"
            go_type: "float64"
          - db_type: "date"
            go_type: "time.Time"
          - db_type: "date"
            nullable: true
            go_type:
              type: "time.Time"
              pointer: true
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              type: "time.Time"
              pointer: true
