services:
  postgres:
    image: postgres:15-alpine
    container_name: sothea-postgres
    environment:
      POSTGRES_DB: sothea
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - '5432:5432'
    command: postgres -c listen_addresses='*'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:z
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d sothea']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
    ports:
      - 3000:3000
    environment:
      PORT: ${PORT:-3000}
      SECRET_KEY: ${SECRET_KEY:-aedbfcbbaffa2a82eff7b2bcac561afb}
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres123@postgres:5432/sothea}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
